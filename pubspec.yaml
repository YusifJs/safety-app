name: safety_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  animate_do: ^5.1.0
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2

  shared_preferences: ^2.5.5
  smooth_page_indicator: ^2.0.1
  dotted_border: ^3.1.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geocoding: ^3.0.0

flutter:
  uses-material-design: true

  assets:

  - assets/images/
  - assets/

