name: safety_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  animate_do: ^5.1.0
  build_runner: ^2.14.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  get_it: ^9.2.1
  google_maps_flutter: ^2.17.0
  json_annotation: ^4.11.0
  json_serializable: ^6.13.1
  retrofit_generator: ^10.2.5
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^2.0.1

  

dev_dependencies:
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_lints: ^6.0.0
  flutter_map: ^8.3.0

  flutter_test:
    sdk: flutter

  latlong2: ^0.9.1
  location: ^8.0.1

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
